---
layout: default
title: Search
sitemap: false
---

<h2>Site Search</h2>

<form id="site_search" class="input-form">
    <input type="search" id="search_box" placeholder="Enter search term ..." oninput="debouncedSearch()" autocomplete="off" />
    <button type="submit">SEARCH</button>
</form>

<div id="index_toggle" role="group" aria-label="Search index">
    <button class="index-btn active" data-index="all">All</button>
    <button class="index-btn" data-index="blog">Blog</button>
    <button class="index-btn" data-index="guidelines">Guidelines</button>
</div>

<div id="search_status"></div>

<div class="entry">
    <ul id="search_results" class="post-content"></ul>
</div>

<style>
    #search_box {
        min-width: 20rem;
    }

    #index_toggle {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.8rem;
    }

    .index-btn {
        border: 1px solid var(--border-color);
        border-radius: 2rem;
        padding: 5px 14px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        background-color: var(--body-bg);
        color: var(--post-date-color);
        transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .index-btn:hover {
        border-color: var(--link-color);
        color: var(--link-color);
    }

    .index-btn.active {
        background-color: var(--link-color);
        border-color: var(--link-color);
        color: #fff;
    }

    #search_status {
        margin: 1rem 0 0.5rem;
        font-size: 0.9rem;
        color: var(--post-date-color);
        min-height: 1.4rem;
    }

    #search_results {
        list-style: none;
        padding-left: 0;
    }

    .search-result {
        padding: 1rem 0;
        border-bottom: 1px solid var(--border-color);
    }

    .search-result:last-child {
        border-bottom: none;
    }

    .search-result-header {
        display: flex;
        align-items: baseline;
        gap: 0.6rem;
        flex-wrap: wrap;
        margin-bottom: 0.3rem;
    }

    .search-result-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--link-color);
        text-decoration: none;
    }

    .search-result-title:hover {
        text-decoration: underline;
    }

    .search-result-type {
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 0.1em 0.5em;
        border-radius: 3px;
        background-color: var(--code-bg);
        color: var(--post-date-color);
        border: 1px solid var(--border-color);
        flex-shrink: 0;
    }

    .search-result-excerpt {
        font-size: 0.9rem;
        color: var(--body-color);
        margin: 0;
        line-height: 1.5;
    }

    .search-spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid var(--border-color);
        border-top-color: var(--link-color);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 0.4rem;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .search-error {
        color: #c0392b;
    }

    #search_results em {
        color: var(--search-highlight-color);
        background-color: var(--search-highlight-bg);
        border-radius: 3px;
        font-style: normal;
    }
</style>

<script>
    function debounce(func, timeout = 350) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => func.apply(this, args), timeout);
        };
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
    }

    function escapeHtmlWithEm(str) {
        return escapeHtml(str)
            .replace(/&lt;em&gt;/g, "<em>")
            .replace(/&lt;\/em&gt;/g, "</em>");
    }

    function resolveUrl(hit) {
        if (hit.type === "blog") return hit.url;
        return "https://guidelines.ryanharrison.co.uk" + hit.url;
    }

    function getSelectedIndex() {
        return document.querySelector(".index-btn.active").dataset.index;
    }

    function setSelectedIndex(index) {
        document.querySelectorAll(".index-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.index === index);
        });
    }

    function setStatus(html) {
        document.getElementById("search_status").innerHTML = html;
    }

    let currentController = null;

    async function runSearchQuery() {
        const query = document.getElementById("search_box").value.trim();
        const index = getSelectedIndex();

        const pageParams = new URLSearchParams({ q: query });
        if (index !== "all") pageParams.set("index", index);
        history.pushState({ query, index }, null, "/search.html" + (query ? "?" + pageParams : ""));

        const resultsList = document.getElementById("search_results");
        resultsList.innerHTML = "";
        setStatus("");

        if (!query) return;

        if (currentController) currentController.abort();
        currentController = new AbortController();

        setStatus('<span class="search-spinner"></span>Searching&hellip;');

        try {
            const apiParams = new URLSearchParams({ q: query });
            if (index !== "all") apiParams.set("index", index);

            const response = await fetch(
                "https://api.ryanharrison.co.uk/search?" + apiParams,
                { signal: currentController.signal }
            );

            if (!response.ok) throw new Error("Server returned " + response.status);

            const data = await response.json();

            if (!Array.isArray(data) || data.length === 0) {
                setStatus("No results found for <strong>" + escapeHtml(query) + "</strong>");
                return;
            }

            setStatus(data.length + " result" + (data.length !== 1 ? "s" : "") + " for <strong>" + escapeHtml(query) + "</strong>");

            data.forEach(hit => {
                const li = document.createElement("li");
                li.className = "search-result";
                const typeLabel = hit.type ? '<span class="search-result-type">' + escapeHtml(hit.type) + '</span>' : "";
                li.innerHTML =
                    '<div class="search-result-header">' +
                        '<a class="search-result-title" href="' + escapeHtml(resolveUrl(hit)) + '">' + escapeHtmlWithEm(hit.title) + '</a>' +
                        typeLabel +
                    '</div>' +
                    (hit.excerpt ? '<p class="search-result-excerpt">' + escapeHtmlWithEm(hit.excerpt) + '</p>' : "");
                resultsList.appendChild(li);
            });
        } catch (err) {
            if (err.name === "AbortError") return;
            setStatus('<span class="search-error">Search failed. Please try again.</span>');
        }
    }

    const debouncedSearch = debounce(runSearchQuery);

    window.onpopstate = function (e) {
        if (!e.state) return;
        document.getElementById("search_box").value = e.state.query || "";
        setSelectedIndex(e.state.index || "all");
        runSearchQuery();
    };

    ready(function () {
        document.getElementById("search_box").focus();

        document.getElementById("site_search").addEventListener("submit", e => {
            e.preventDefault();
            runSearchQuery();
        });

        document.querySelectorAll(".index-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                setSelectedIndex(btn.dataset.index);
                if (document.getElementById("search_box").value.trim()) runSearchQuery();
            });
        });

        const params = new URLSearchParams(window.location.search);
        const qs = params.get("q");
        const qi = params.get("index") || "all";
        if (qs) {
            document.getElementById("search_box").value = qs;
            setSelectedIndex(qi);
            runSearchQuery();
        }
    });
</script>
